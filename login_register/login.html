<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UniBites</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <!-- NAVIGATION BAR -->
    <nav class="navbar">
        <div class="logo"><a href="../index.html">UniBites</a></div>
        <div class="nav-buttons">
            <button class="login" data-i18n="login">Login</button>
            <button class="signup"><a href="register.html" data-i18n="signup">Sign Up</a></button>
        </div>
    </nav>

    <section class="utility-bar" aria-label="Language controls">
        <div class="utility-group">
            <button class="utility-trigger" type="button" data-menu-target="language-menu" aria-expanded="false" aria-controls="language-menu">
                <span id="language-label">ENG</span> ▾
            </button>
            <div class="utility-menu" id="language-menu" hidden>
                <label>
                    <input type="radio" name="language" value="en" checked>
                    English(EN)
                </label>
                <label>
                    <input type="radio" name="language" value="gr">
                    Ελληνικά(GR)
                </label>
            </div>
        </div>
    </section>

    <!-- LOGIN FORM -->
    <section class="auth-container">
        <div class="auth-form">
            <h2 data-i18n="loginTitle">Login to UniBites</h2>
            <form>
                <div class="form-group">
                    <label for="email" data-i18n="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password" data-i18n="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="auth-button" data-i18n="login">Login</button>
            </form>
            <p class="form-footer">
                <span data-i18n="noAccount">Don't have an account?</span>
                <a href="register.html" data-i18n="signupHere">Sign up here</a>
            </p>
        </div>
    </section>

    <footer class="footer">
    <div class="footer-content">
        <div class="footer-section links">
        <h4 data-i18n="quickLinks">Quick Links</h4>
        <ul>
            <li><a href="../index.html" data-i18n="home">Home</a></li>
            <li><a href="#" data-i18n="about">About</a></li>
            <li><a href="#" data-i18n="contact">Contact</a></li>
        </ul>
        </div>
        <div class="footer-section contact">
        <h4 data-i18n="contact">Contact</h4>
        <p>Email: teamemail@upnet.gr</p>
        </div>
    </div>
    <div class="footer-bottom">
        &copy; 2026 University of Patras. All rights reserved.
    </div>
    </footer>

    <script src="login.js"></script>

</body>
</html>
