<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniBites | Deliveries</title>
    <link rel="stylesheet" href="deliveries.css">
</head>

<body class="theme-light">

    <!-- TOP NAV -->
    <header class="topbar">
        <div class="topbar-left">
            <a class="logo" href="/">UniBites</a>
        </div>
    </header>

    <!-- UTILITY BAR -->
    <section class="utility-bar">
        <div class="utility-group">
            <button class="utility-trigger">Choose Theme ◐</button>
            <div class="utility-menu">
                <label><input type="radio" name="theme"> Dark</label>
                <label><input type="radio" name="theme" checked> Light</label>
            </div>
        </div>
        <div class="utility-group">
            <button class="utility-trigger">ENG ▾</button>
            <div class="utility-menu">
                <label><input type="radio" name="language" checked> English</label>
                <label><input type="radio" name="language"> Ελληνικά</label>
            </div>
        </div>
    </section>

    <!-- LAYOUT -->
    <div class="layout deliveries-layout">
        <!-- SIDEBAR -->
        <aside class="account-sidebar">
            <section class="account-box">
                <h3 class="username">User 1</h3>
                <p class="credits">Credits: 120</p>
                <a href="#" class="menu-link">Edit Account</a>
            </section>
            <nav class="account-menu">
                <a href="/orders" class="menu-link">Your Orders</a>
                <a href="/meal-posts" class="menu-link">Your Meal Posts</a>
                <a href="/deliveries" class="menu-link active">Deliveries</a>
                <a href="/pending-requests" class="menu-link">Pending Requests</a>
                <a href="/logout" class="menu-link logout">Log Out</a>
            </nav>
        </aside>

        <!-- MAIN -->
        <main class="main deliveries-main">
            <header class="page-heading">
                <h1>Meal Deliveries</h1>
                <p>Manage the delivery status of your posted meals</p>
            </header>
            <!-- DELIVERIES -->
            <section class="deliveries-section">
                <div class="delivery-list">

                    <!-- DELIVERY CARD -->
                    <article class="delivery-list-item highlight">
                        <div class="delivery-list-info">
                            <div class="delivery-title-row">
                                <h3 class="delivery-list-title">Homemade Pizza</h3>
                                <span class="delivery-user">Anna M.</span>
                                <span class="delivery-status">Pending</span>
                            </div>
                            <p class="delivery-list-meta">Aratou 60, Patras • 18:00–18:30</p>
                        </div>
                        <div class="delivery-actions">
                            <button class="btn confirm-delivery">Confirmed</button>
                            <button class="btn danger fail-delivery">Failed</button>
                        </div>
                    </article>
                </div>
            </section>

<!---------------------------------------------------------------------------------- CONFRIM ACTION MODAL ------------------------------------------------------------------------------------------------------------>
            <div class="confirm-modal hidden" id="confirmModal">
                <div class="modal-overlay"></div>

                <div class="confirm-modal-content">
                    <h2 id="confirmTitle">Confirm action</h2>
                    <p id="confirmText">Are you sure?</p>

                    <div class="confirm-actions">
                        <button class="btn primary" id="confirmYes">Yes</button>
                        <button class="btn secondary" id="confirmNo">Cancel</button>
                    </div>
                </div>
            </div>
        
        </main>
    </div>
    <script src="deliveries.js"></script>

</body>
</html>
